plugins {
    id 'java'
}

group = 'kr.co.tlf.javaex'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation platform('com.fasterxml.jackson:jackson-bom:2.17.0')
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation platform('com.fasterxml.jackson:jackson-bom:2.17.0')
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.oracle.database.jdbc:ojdbc11:23.9.0.25.07'
    implementation("com.oracle.database.security:oraclepki:23.3.0.23.09")
    implementation("com.oracle.database.security:osdt_cert:21.17.0.0")
    implementation("com.oracle.database.security:osdt_core:21.17.0.0")
//    implementation 'com.h2database:h2:2.2.4'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}